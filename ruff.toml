# Ruff configuration for AI Visibility Auditor
target-version = "py312"
line-length = 160

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "N",    # pep8-naming
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
]
ignore = [
  "E501",   # line too long (handled by formatter)
  "SIM108", # use ternary operator (readability preference)
]

[lint.isort]
known-first-party = ["scripts"]

[format]
quote-style = "double"
indent-style = "space"
