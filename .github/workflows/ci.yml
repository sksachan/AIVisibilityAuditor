name: Auditor CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'config/**'
      - 'schemas/**'
      - 'requirements.txt'
      - '.github/workflows/**'
  push:
    branches: [main]

jobs:
  lint-test:
    name: Lint → Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with Ruff
        run: |
          ruff check scripts/ tests/
          ruff format --check scripts/ tests/

      - name: Validate schemas
        run: python -c "import json, pathlib; [json.loads(p.read_text()) for p in pathlib.Path('schemas').glob('*.json')]; print('All schemas valid')"

      - name: Validate pipeline config
        run: python -c "import yaml, pathlib; yaml.safe_load(pathlib.Path('config/pipeline_config.yaml').read_text()); print('Pipeline config valid')"

      - name: Run tests
        run: pytest tests/ -v --tb=short
